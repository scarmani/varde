<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Varde</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">STACK · SURROUND · SURVIVE</p>
        <h1>Varde</h1>
      </div>
      <div class="turn" id="turn-status">Loading board…</div>
    </header>

    <section class="game-card">
      <canvas id="game" width="960" height="680" aria-label="Varde game board"></canvas>
      <div class="controls" aria-label="Game controls">
        <select id="game-mode" aria-label="Game mode">
          <option value="hotseat">Two players</option>
          <option value="computer">Vs computer</option>
          <option value="watch">Watch two computers</option>
        </select>
        <select id="board-size" aria-label="Board size">
          <option value="3">Toy (54 points)</option>
          <option value="4">Beginner (96 points · recommended)</option>
          <option value="5">Intermediate (150 points)</option>
          <option value="6">Full (216 points · marathon — best watched)</option>
        </select>
        <select id="ruleset" aria-label="Ruleset">
          <option value="classic">Classic rules</option>
          <option value="rosette">Rosette rules (experimental)</option>
        </select>
        <select id="human-color" class="versus-setting" aria-label="Your color">
          <option value="B">Play Black</option>
          <option value="W">Play White</option>
        </select>
        <select id="difficulty" class="versus-setting" aria-label="Computer difficulty">
          <option value="casual">Casual computer</option>
          <option value="standard" selected>Standard computer</option>
        </select>
        <select id="profile" class="versus-setting" aria-label="Computer profile">
          <option value="balanced">Profile: Balanced</option>
        </select>
        <select id="black-difficulty" class="watch-setting" aria-label="Black computer difficulty">
          <option value="casual">Black: Casual</option>
          <option value="standard" selected>Black: Standard</option>
        </select>
        <select id="black-profile" class="watch-setting" aria-label="Black computer profile">
          <option value="balanced">Black profile: Balanced</option>
        </select>
        <select id="white-difficulty" class="watch-setting" aria-label="White computer difficulty">
          <option value="casual">White: Casual</option>
          <option value="standard" selected>White: Standard</option>
        </select>
        <select id="white-profile" class="watch-setting" aria-label="White computer profile">
          <option value="balanced">White profile: Balanced</option>
        </select>
        <label class="toggle any-computer-setting">
          <input id="explain-moves" type="checkbox" checked>
          Explain moves
        </label>
        <button id="new-btn">New game</button>
        <button id="pass-btn">Pass</button>
        <button id="swap-btn" class="accent" hidden>Take over Black</button>
        <button id="resume-btn" class="accent" hidden>Resume once</button>
        <button id="save-btn">Save</button>
        <button id="load-btn">Load</button>
        <input id="load-file" type="file" accept="application/json" hidden>
      </div>
      <div id="profile-controls" class="subcontrols profile-controls any-computer-setting" hidden aria-label="Computer profile description">
        <strong>Style</strong>
        <span id="profile-note">Balanced uses the original evaluator.</span>
      </div>
      <div id="spectator-controls" class="subcontrols" hidden aria-label="Spectator playback controls">
        <strong>Spectator</strong>
        <button id="play-btn" class="accent">Play</button>
        <button id="step-btn">Step</button>
        <select id="playback-speed" aria-label="Playback speed">
          <option value="1200">Slow</option>
          <option value="500" selected>Normal</option>
          <option value="100">Fast</option>
        </select>
        <span id="playback-note">Paused</span>
      </div>
      <div class="subcontrols training-controls" aria-label="Personal computer learning controls">
        <strong>Personal learning</strong>
        <select id="training-games" aria-label="Training batch size">
          <option value="10">10 games</option>
          <option value="50">50 games</option>
          <option value="200">200 games</option>
        </select>
        <button id="train-btn">Train</button>
        <button id="cancel-training-btn" disabled>Cancel</button>
        <button id="reset-training-btn">Reset</button>
        <span id="training-status" aria-live="polite">Personal model: loading…</span>
      </div>
    </section>

    <footer>
      <span><i class="legend legal"></i> legal placement</span>
      <span><i class="legend sky"></i> sky liberty</span>
      <span>Hover to inspect stacks · press <kbd>F</kbd> for fullscreen</span>
      <span id="ai-note" aria-live="polite"></span>
      <span id="message" role="status"></span>
    </footer>
  </main>
  <script src="/game.js"></script>
</body>
</html>
